<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>じまんカード：うちのあばごっち</title>
  <style>
    :root { --bg:#0f1226; --card:#1b1f3b; --text:#eef1ff; --muted:#aab2d5; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
           background:radial-gradient(900px 500px at 65% -10%,#2a2f63,var(--bg) 60%);
           color:var(--text); min-height:100vh;
           display:flex; justify-content:center; align-items:center; padding:24px; }
    .card { background:var(--card); border:1px solid rgba(255,255,255,.1); border-radius:24px;
            padding:28px 24px; max-width:400px; width:100%;
            box-shadow:0 16px 48px rgba(0,0,0,.45); text-align:center; }

    /* タイトル — 一番大きく */
    .card-title { font-size:1.6rem; font-weight:900; letter-spacing:.04em;
                  margin-bottom:20px; line-height:1.2; }

    /* 顔：外□（正方形）が内□（横長）＋3ボタンを内包 */
    .face-wrap { display:flex; justify-content:center; margin-bottom:16px; }
    .face-outer { width:116px; height:116px; border:3px solid var(--face-color,#888);
                  border-radius:14px; display:flex; flex-direction:column;
                  align-items:center; justify-content:center; gap:8px; }
    .face-inner { width:96px; height:52px; border-radius:8px;
                  border:3px solid var(--face-color,#888); position:relative; }
    .eye { width:12px; height:12px; border-radius:50%; position:absolute; top:12px; }
    .eye.l { left:15px; } .eye.r { right:15px; }
    .mouth { width:30px; height:3px; border-radius:2px;
             position:absolute; bottom:10px; left:50%; transform:translateX(-50%); }
    .btns { display:flex; gap:8px; }
    .btn-sq { width:20px; height:13px; border:2px solid rgba(255,255,255,.3); border-radius:3px; }

    /* キャラ情報 */
    .persona { font-size:1.05rem; font-weight:700; color:#6cc6ff; margin-bottom:4px; }
    .fav     { font-size:.88rem; color:var(--muted); margin-bottom:6px; }
    .achieve { display:inline-block; background:rgba(108,198,255,.14); color:#6cc6ff;
               border-radius:999px; padding:4px 16px; font-size:.9rem; margin-bottom:20px; }

    /* ステータスグリッド */
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .stat { background:rgba(255,255,255,.055); border-radius:14px; padding:11px 8px; }
    .stat b { display:block; font-size:1.45rem; line-height:1.1; }
    .stat span { color:var(--muted); font-size:.72rem; }

    /* ゲーム成績 */
    .medals-wrap { margin-bottom:12px; }
    .medals-label { font-size:.75rem; color:var(--muted); margin-bottom:6px; }
    .medals-row { display:flex; justify-content:center; gap:8px; }
    .medal { background:rgba(255,255,255,.05); border-radius:12px; padding:9px 12px;
             display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; }
    .medal .ico { font-size:1.35rem; }
    .medal .cnt { font-size:1.1rem; font-weight:700; }
    .medal .lbl { font-size:.68rem; color:var(--muted); }

    .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .share { display:inline-block; background:#1d9bf0; color:#fff; text-decoration:none;
             padding:12px 24px; border-radius:999px; font-weight:700; font-size:1rem; }
    .dl    { display:inline-block; background:rgba(255,255,255,.1); color:var(--text);
             border:1px solid rgba(255,255,255,.2); cursor:pointer;
             padding:12px 24px; border-radius:999px; font-weight:700; font-size:1rem;
             font-family:inherit; }
    .dl:active { opacity:.7; }
    .home  { display:block; margin-top:14px; color:var(--muted); font-size:.82rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">じまんカード：うちのあばごっち</div>

    <div class="face-wrap">
      <div class="face-outer" id="faceOuter">
        <div class="face-inner" id="faceInner">
          <div class="eye l" id="eyeL"></div>
          <div class="eye r" id="eyeR"></div>
          <div class="mouth" id="mouth"></div>
        </div>
        <div class="btns">
          <div class="btn-sq"></div><div class="btn-sq"></div><div class="btn-sq"></div>
        </div>
      </div>
    </div>

    <div class="persona" id="persona">せいかく：—</div>
    <div class="fav"     id="fav">すきなもの：—</div>
    <div class="achieve" id="achieve">みならい</div>

    <div class="grid">
      <div class="stat"><b id="days">0</b><span>そだてた日数</span></div>
      <div class="stat"><b id="level">1</b><span>レベル</span></div>
      <div class="stat"><b id="friends">0</b><span>ともだち</span></div>
      <div class="stat"><b id="wins">0</b><span>ちえくらべ勝利</span></div>
    </div>

    <div class="medals-wrap">
      <div class="medals-label">ゲーム成績</div>
      <div class="medals-row">
        <div class="medal"><div class="ico">🥇</div><div class="cnt" id="gold">0</div><div class="lbl">きんメダル</div></div>
        <div class="medal"><div class="ico">🥈</div><div class="cnt" id="silver">0</div><div class="lbl">ぎんメダル</div></div>
        <div class="medal"><div class="ico">🥉</div><div class="cnt" id="bronze">0</div><div class="lbl">どうメダル</div></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="dl" id="dlBtn">画像を保存</button>
      <a class="share" id="share" href="#" target="_blank" rel="noopener">𝕏 でシェア</a>
    </div>
    <a class="home" href="./">← AvaGotchi を書き込む</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const PERSONALITY = ["くいしんぼう","あまえんぼう","げんきっこ","おっとり"];
    const FAVORITES   = [
      "おさかな","おにく","くだもの","おこめ","おやつ",
      "ねじ","でんち","はんだ","かみ","ぼると",
      "アルゴリズム","プラスチック",
    ];

    const q      = new URLSearchParams(location.hash.slice(1));
    const ni     = (k, d=0) => parseInt(q.get(k) ?? d, 10) || 0;
    const hue    = ni("c", 200);
    const pIdx   = Math.min(3, ni("p", 0));
    const favIdx = Math.min(FAVORITES.length - 1, ni("fav", 0));
    const days = ni("d"), level = ni("l",1), friends = ni("f"), wins = ni("w");
    const g = ni("g"), s = ni("s"), b = ni("b");

    // 顔色を CSS 変数で設定（outer・inner 枠・目・口を同系色に）
    const faceHsl = `hsl(${hue},65%,62%)`;
    const darkHsl = `hsl(${hue},50%,22%)`;
    document.documentElement.style.setProperty("--face-color", faceHsl);
    document.getElementById("faceInner").style.background = faceHsl;
    ["eyeL","eyeR","mouth"].forEach(id =>
      document.getElementById(id).style.background = darkHsl);

    document.getElementById("persona").textContent  = "せいかく：" + PERSONALITY[pIdx];
    document.getElementById("fav").textContent      = "すきなもの：" + FAVORITES[favIdx];
    document.getElementById("days").textContent     = days;
    document.getElementById("level").textContent    = level;
    document.getElementById("friends").textContent  = friends;
    document.getElementById("wins").textContent     = wins;
    document.getElementById("gold").textContent     = g;
    document.getElementById("silver").textContent   = s;
    document.getElementById("bronze").textContent   = b;

    // 称号
    let title = "みならい";
    if      (g >= 10)       title = "ゲームマスター";
    else if (wins >= 10)    title = "ちえくらべおうじゃ";
    else if (level >= 20)   title = "でんせつっち";
    else if (friends >= 20) title = "にんきもの";
    else if (level >= 10)   title = "いちにんまえ";
    else if (friends >= 5)  title = "ともだち おおい";
    document.getElementById("achieve").textContent = "「" + title + "」";

    // Xシェア
    const text =
      `うちのあばごっち（${PERSONALITY[pIdx]}・すき:${FAVORITES[favIdx]}）` +
      `そだて${days}日 Lv${level} ともだち${friends}ひき ` +
      `🥇${g}🥈${s}🥉${b} ちえくらべ${wins}しょうり 「${title}」` +
      ` #AvaGotchi #ｽﾀｯｸﾁｬﾝ`;
    document.getElementById("share").href =
      "https://twitter.com/intent/tweet?text=" + encodeURIComponent(text) +
      "&url=" + encodeURIComponent("https://sin1.studio/AvaGotchi/");

    // カード画像をダウンロード
    document.getElementById("dlBtn").addEventListener("click", () => {
      const btn = document.getElementById("dlBtn");
      btn.textContent = "生成中…";
      btn.disabled = true;
      html2canvas(document.querySelector(".card"), {
        backgroundColor: "#1b1f3b",
        scale: 2,
        useCORS: true,
      }).then(canvas => {
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = `avagotchi_${PERSONALITY[pIdx]}_lv${level}.png`;
        a.click();
      }).finally(() => {
        btn.textContent = "画像を保存";
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
