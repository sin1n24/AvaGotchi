; M5Stack Basic / Gray 共用ファーム。
; 4MB(Basic) と 16MB(Gray) の両方で起動できるよう huge_app.csv(4MB/OTA無し) を使用。
; IMUの有無(Gray=有/Basic無印=無)は M5Unified が実機で自動判定する。
[env:m5stack]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
board_build.partitions = partitions_avagotchi.csv
lib_deps =
    m5stack/M5Unified
    meganetaaan/M5Stack-Avatar
    bblanchon/ArduinoJson
build_flags =
    -DCORE_DEBUG_LEVEL=0
